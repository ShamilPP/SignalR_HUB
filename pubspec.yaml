name: signalr_hub
description: A maintained Flutter client for ASP.NET Core SignalR with null-arg support, reconnection stability, and critical crash fixes.
version: 2.0.0
homepage: https://github.com/ShamilPP/SignalR_HUB
repository: https://github.com/ShamilPP/SignalR_HUB
issue_tracker: https://github.com/ShamilPP/SignalR_HUB/issues
topics:
  - signalr
  - websocket
  - aspnetcore
  - realtime

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  logging: ^1.3.0
  web_socket_channel: ^3.0.3
  sse_channel: ^0.2.2
  message_pack_dart: ^2.0.1
  http: ^1.6.0
  get_it: ^9.2.1
  equatable: ^2.0.8

dev_dependencies:
  collection: ^1.19.1
  flutter_test:
    sdk: flutter
  lints: ^5.1.1
  quiver: ^3.2.2
  rxdart: ^0.28.0
